#
# File: .github/workflows/docker-image.yml
# Description: Build and publish the BananaWRT builder container to GHCR.
#              Multi-arch (linux/amd64 + linux/arm64). Rebuilds on Dockerfile
#              or setup-env.sh changes, and weekly for security patches.
#
# Copyright (c) 2024-2026 SuperKali <hello@superkali.me>
#
# This is free software, licensed under the MIT License.
#

name: BananaWRT Builder Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - .github/scripts/setup-env.sh
      - .github/workflows/docker-image.yml
  schedule:
    # Weekly rebuild to pick up upstream security updates (Mon 04:00 UTC)
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag as :latest'
        type: boolean
        default: true
      no_cache:
        description: 'Disable build cache'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & publish multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image name (OCI references must be lowercase)
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository_owner }}/bananawrt-builder' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=${{ github.event_name != 'workflow_dispatch' || inputs.push_latest == true }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY-MM-DD'}}
            type=sha,prefix=sha-,format=short
            type=schedule,pattern=weekly

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          no-cache: ${{ inputs.no_cache == true }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Summary
        run: |
          {
            echo '## BananaWRT builder image published'
            echo
            echo '| Field | Value |'
            echo '|---|---|'
            echo "| Registry | \`${{ env.REGISTRY }}\` |"
            echo "| Image    | \`${{ env.IMAGE_NAME }}\` |"
            echo "| Digest   | \`${{ steps.build.outputs.digest }}\` |"
            echo '| Tags     |'
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              echo "| | \`$tag\` |"
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"
