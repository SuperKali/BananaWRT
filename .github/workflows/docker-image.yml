#
# File: .github/workflows/docker-image.yml
# Description: Build and publish the BananaWRT builder container to GHCR.
#              Each architecture is built natively on its own runner
#              (ubuntu-latest for amd64, ubuntu-24.04-arm for arm64) and the
#              per-arch images are then merged into a single multi-arch
#              manifest. Avoids QEMU entirely.
#
# Copyright (c) 2024-2026 SuperKali <hello@superkali.me>
#
# This is free software, licensed under the MIT License.
#

name: BananaWRT Builder Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker-image.yml
  schedule:
    # Weekly rebuild to pick up upstream security updates (Mon 04:00 UTC)
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag as :latest'
        type: boolean
        default: true
      no_cache:
        description: 'Disable build cache'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            slug: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image name (OCI references must be lowercase)
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository_owner }}/bananawrt-builder' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          no-cache: ${{ inputs.no_cache == true }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.slug }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.slug }},mode=max
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artefact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Compute image name (OCI references must be lowercase)
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository_owner }}/bananawrt-builder' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Download digest artefacts
        uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=${{ github.event_name != 'workflow_dispatch' || inputs.push_latest == true }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY-MM-DD'}}
            type=sha,prefix=sha-,format=short
            type=schedule,pattern=weekly

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          # Build the `-t tag1 -t tag2 ...` flag list from metadata output
          tag_args=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            tag_args="$tag_args -t $tag"
          done <<< "${{ steps.meta.outputs.tags }}"

          docker buildx imagetools create $tag_args \
            $(printf "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s " *)

      - name: Inspect final manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"

      - name: Summary
        run: |
          {
            echo '## BananaWRT builder image published'
            echo
            echo '| Field | Value |'
            echo '|---|---|'
            echo "| Registry | \`${{ env.REGISTRY }}\` |"
            echo "| Image    | \`${{ env.IMAGE_NAME }}\` |"
            echo '| Tags     |'
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              echo "| | \`$tag\` |"
            done <<< "${{ steps.meta.outputs.tags }}"
            echo
            echo '### Platforms'
            echo '- linux/amd64 (native ubuntu-latest)'
            echo '- linux/arm64 (native ubuntu-24.04-arm)'
          } >> "$GITHUB_STEP_SUMMARY"
