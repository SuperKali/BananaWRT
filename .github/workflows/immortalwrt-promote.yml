#
# File: .github/workflows/immortalwrt-promote.yml
# Description: Promote nightly to stable, demote the previous stable to
#              oldstable, and optionally set up a new nightly version line.
#
# Copyright (c) 2024-2025 SuperKali <hello@superkali.me>
#
# This is free software, licensed under the MIT License.
# See /LICENSE for more information.

name: Promote Nightly to Stable

on:
  workflow_dispatch:
    inputs:
      new_stable_version:
        description: 'Version line to promote to stable (e.g., v25.12)'
        required: true
        type: string
      new_nightly_version:
        description: 'New nightly version line (e.g., v26.06). Leave empty to disable nightly.'
        required: false
        type: string
        default: ''
      new_nightly_branch:
        description: 'Initial branch for new nightly (e.g., 26.06.0). Required if new nightly is set.'
        required: false
        type: string
        default: ''
      new_nightly_feed_branch:
        description: 'Feed branch for new nightly (e.g., v26.06). Required if new nightly is set.'
        required: false
        type: string
        default: ''

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Validate inputs
      run: |
        NEW_STABLE="${{ inputs.new_stable_version }}"
        VERSION_JSON="config/${NEW_STABLE}/version.json"

        if [ ! -f "$VERSION_JSON" ]; then
          echo "::error::Version ${NEW_STABLE} does not exist (no ${VERSION_JSON})"
          exit 1
        fi

        CURRENT_TRACKS=$(jq -r '.tracks[]' "$VERSION_JSON")
        if ! echo "$CURRENT_TRACKS" | grep -qx "nightly"; then
          echo "::error::${NEW_STABLE} does not have a nightly track to promote"
          exit 1
        fi

        if [ -n "${{ inputs.new_nightly_version }}" ] && [ -z "${{ inputs.new_nightly_branch }}" ]; then
          echo "::error::new_nightly_branch is required when new_nightly_version is set"
          exit 1
        fi

        echo "Validation passed."

    - name: Detect current stable
      id: current
      run: |
        # Find which version line currently holds the stable track
        CURRENT_STABLE=""
        for vf in config/*/version.json; do
          vl=$(jq -r '.version_line' "$vf")
          if jq -e '.tracks | index("stable")' "$vf" > /dev/null 2>&1; then
            CURRENT_STABLE="$vl"
            break
          fi
        done
        echo "current_stable=$CURRENT_STABLE" >> $GITHUB_OUTPUT
        echo "Current stable: ${CURRENT_STABLE:-none}"

    # Move a version line's config + kernel patches from one track to another.
    # Patches live under two roots: patch/kernel/dts/<line>/<track> and
    # patch/tree/<line>/<track>.
    - name: Promote nightly to stable
      run: |
        NEW_STABLE="${{ inputs.new_stable_version }}"

        # Move the nightly config directory to stable
        if [ -d "config/${NEW_STABLE}/nightly" ]; then
          git mv "config/${NEW_STABLE}/nightly" "config/${NEW_STABLE}/stable"
        fi

        # Move kernel patches (dts + tree) from nightly to stable
        for root in patch/kernel/dts patch/tree; do
          SRC="${root}/${NEW_STABLE}/nightly"
          DST="${root}/${NEW_STABLE}/stable"
          if [ -d "$SRC" ]; then
            git mv "$SRC" "$DST"
          fi
        done

        # Update version.json: nightly track becomes stable
        VERSION_JSON="config/${NEW_STABLE}/version.json"
        jq '(.tracks | map(if . == "nightly" then "stable" else . end) | unique) as $t | .tracks = $t' \
          "$VERSION_JSON" > "$VERSION_JSON.tmp"
        mv "$VERSION_JSON.tmp" "$VERSION_JSON"

        echo "Promoted ${NEW_STABLE}: nightly config/patches are now stable."

    - name: Demote old stable to oldstable
      run: |
        OLD_STABLE="${{ steps.current.outputs.current_stable }}"
        NEW_STABLE="${{ inputs.new_stable_version }}"

        if [ -z "$OLD_STABLE" ] || [ "$OLD_STABLE" = "$NEW_STABLE" ]; then
          echo "No old stable to demote (or same version)."
          exit 0
        fi

        # Move the stable config directory to oldstable
        if [ -d "config/${OLD_STABLE}/stable" ]; then
          git mv "config/${OLD_STABLE}/stable" "config/${OLD_STABLE}/oldstable"
        fi

        # Move kernel patches (dts + tree) from stable to oldstable
        for root in patch/kernel/dts patch/tree; do
          SRC="${root}/${OLD_STABLE}/stable"
          DST="${root}/${OLD_STABLE}/oldstable"
          if [ -d "$SRC" ]; then
            git mv "$SRC" "$DST"
          fi
        done

        # Update version.json: stable track becomes oldstable, stays active
        OLD_VERSION_JSON="config/${OLD_STABLE}/version.json"
        jq '.tracks = (.tracks | map(if . == "stable" then "oldstable" else . end) | unique)' \
          "$OLD_VERSION_JSON" > "$OLD_VERSION_JSON.tmp"
        mv "$OLD_VERSION_JSON.tmp" "$OLD_VERSION_JSON"

        echo "Demoted ${OLD_STABLE} to oldstable."

    - name: Ensure oldstable caller exists
      run: |
        OLDSTABLE_CALLER=".github/workflows/immortalwrt-builder-oldstable.yml"
        if [ -f "$OLDSTABLE_CALLER" ]; then
          echo "Oldstable caller already present."
          exit 0
        fi
        cat > "$OLDSTABLE_CALLER" <<'YAML'
        #
        # File: .github/workflows/immortalwrt-builder-oldstable.yml
        # Description: Build BananaWRT firmware (Oldstable)
        #
        # Copyright (c) 2024-2025 SuperKali <hello@superkali.me>
        #
        # This is free software, licensed under the MIT License.
        # See /LICENSE for more information.

        name: BananaWRT Builder (Oldstable)

        on:
          repository_dispatch:
          workflow_dispatch:
          schedule:
            - cron: 0 0 15 * *

        permissions:
          contents: write
          packages: read
          actions: write

        jobs:
          resolve:
            runs-on: ubuntu-latest
            outputs:
              version: ${{ steps.read.outputs.version }}
            steps:
            - uses: actions/checkout@v6
            - id: read
              run: |
                for vf in config/*/version.json; do
                  if jq -e '.tracks | index("oldstable")' "$vf" > /dev/null 2>&1; then
                    VERSION=$(jq -r '.branch' "$vf")
                    echo "version=$VERSION" >> $GITHUB_OUTPUT
                    echo "Resolved oldstable version: $VERSION from $vf"
                    exit 0
                  fi
                done
                echo "::error::No version with oldstable track found"
                exit 1

          build:
            needs: resolve
            uses: ./.github/workflows/immortalwrt-builder.yml
            with:
              immortalwrt_version: ${{ needs.resolve.outputs.version }}
              release_type: oldstable
            secrets: inherit
        YAML
        echo "Created oldstable caller."

    - name: Update checker matrix
      run: |
        NEW_STABLE="${{ inputs.new_stable_version }}"
        OLD_STABLE="${{ steps.current.outputs.current_stable }}"
        CHECKER=".github/workflows/immortalwrt-checker.yml"

        # Promoted line: its checker entry now points at the stable config
        sed -i "s|config_path: config/${NEW_STABLE}/nightly/.config|config_path: config/${NEW_STABLE}/stable/.config|g" "$CHECKER"

        # Demoted line: its checker entry now points at the oldstable config
        if [ -n "$OLD_STABLE" ] && [ "$OLD_STABLE" != "$NEW_STABLE" ]; then
          sed -i "s|config_path: config/${OLD_STABLE}/stable/.config|config_path: config/${OLD_STABLE}/oldstable/.config|g" "$CHECKER"
        fi

        echo "Updated checker matrix."

    - name: Setup new nightly
      if: inputs.new_nightly_version != ''
      run: |
        NEW_NIGHTLY="${{ inputs.new_nightly_version }}"
        NEW_NIGHTLY_BRANCH="${{ inputs.new_nightly_branch }}"
        NEW_NIGHTLY_FEED="${{ inputs.new_nightly_feed_branch }}"
        NEW_STABLE="${{ inputs.new_stable_version }}"

        # Create directory structure for the new nightly line
        mkdir -p "config/${NEW_NIGHTLY}/nightly"
        mkdir -p "patch/kernel/dts/${NEW_NIGHTLY}/nightly"
        mkdir -p "patch/tree/${NEW_NIGHTLY}/nightly"

        # Seed config + patches from the just-promoted stable as a starting point
        cp "config/${NEW_STABLE}/stable/.config" "config/${NEW_NIGHTLY}/nightly/.config"
        for root in patch/kernel/dts patch/tree; do
          SRC="${root}/${NEW_STABLE}/stable"
          DST="${root}/${NEW_NIGHTLY}/nightly"
          if [ -d "$SRC" ]; then
            mkdir -p "$DST"
            cp -r "$SRC/"* "$DST/" 2>/dev/null || true
          fi
        done

        # Inherit the package set from the promoted version
        PACKAGES=$(jq -r '.packages' "config/${NEW_STABLE}/version.json")

        jq -n \
          --arg vl "$NEW_NIGHTLY" \
          --arg branch "$NEW_NIGHTLY_BRANCH" \
          --arg feed "$NEW_NIGHTLY_FEED" \
          --arg pattern "${NEW_NIGHTLY}\\\\." \
          --argjson packages "$PACKAGES" \
          '{version_line: $vl, branch: $branch, status: "active", tracks: ["nightly"], feed_branch: $feed, checker_pattern: $pattern, packages: $packages}' \
          > "config/${NEW_NIGHTLY}/version.json"

        # Re-enable the nightly cron (it is removed when no new nightly is set)
        NIGHTLY_CALLER=".github/workflows/immortalwrt-builder-nightly.yml"
        if ! grep -q '^  schedule:$' "$NIGHTLY_CALLER"; then
          sed -i "/^  workflow_dispatch:/i\\  schedule:\\n    - cron: 0 0 * * 0" "$NIGHTLY_CALLER"
        fi

        # Append a checker matrix entry for the new nightly line
        CHECKER=".github/workflows/immortalwrt-checker.yml"
        sed -i "/include:/a\\          - version_line: ${NEW_NIGHTLY}\\n            tag_prefix: ${NEW_NIGHTLY}\\n            config_path: config/${NEW_NIGHTLY}/nightly/.config" "$CHECKER"

        echo "Created new nightly ${NEW_NIGHTLY} (branch: ${NEW_NIGHTLY_BRANCH})."

    - name: Disable nightly if no new version
      if: inputs.new_nightly_version == ''
      run: |
        # Remove schedule block (2 lines: schedule: + cron line) from nightly caller
        sed -i '/^  schedule:$/,/^    - cron:/d' .github/workflows/immortalwrt-builder-nightly.yml
        echo "Disabled nightly cron (no new nightly version specified)."

    - name: Create promotion PR
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        branch: promote-${{ inputs.new_stable_version }}-to-stable
        commit-message: 'feat: promote ${{ inputs.new_stable_version }} to stable'
        title: 'Promote ${{ inputs.new_stable_version }} to stable'
        body: |
          ## Promotion: ${{ inputs.new_stable_version }} → Stable

          **Changes:**
          - Promoted `${{ inputs.new_stable_version }}` nightly config/patches to stable
          - Demoted `${{ steps.current.outputs.current_stable }}` from stable to oldstable
          - Updated version checker matrix
          ${{ inputs.new_nightly_version != '' && format('- Created new nightly: `{0}` (branch: `{1}`)', inputs.new_nightly_version, inputs.new_nightly_branch) || '- Nightly cron disabled (no new version)' }}

        labels: promotion, ${{ inputs.new_stable_version }}
