#
# immortalwrt-builder.yml — reusable BananaWRT firmware build.
# Runs ./compile.sh --ci inside the pre-built container with layered
# actions/cache restore/save and dynamic self-hosted ↔ GitHub-hosted runner
# selection.
#
# Copyright (c) 2019-2024 P3TERX <https://p3terx.com>
# Copyright (c) 2024-2026 SuperKali <hello@superkali.me> — MIT.
#

name: BananaWRT Builder (Reusable)

on:
  workflow_call:
    inputs:
      immortalwrt_version:
        required: true
        type: string
        description: 'ImmortalWRT version (e.g., 24.10.5, 25.12.0)'
      release_type:
        required: true
        type: string
        description: 'Release type (stable or nightly)'
      architecture:
        required: false
        type: string
        default: 'ARM64'
        description: 'Runner architecture (ARM64 or X64)'
      nproc:
        required: false
        type: string
        default: ''
        description: 'Number of threads for compilation'
      image_ref:
        required: false
        type: string
        default: 'ghcr.io/superkali/bananawrt-builder:latest'
        description: 'BananaWRT builder container image reference'
    secrets:
      PERSONAL_ACCESS_TOKEN:
        required: false
      FTP_HOST:
        required: false
      FTP_USERNAME:
        required: false
      FTP_PASSWORD:
        required: false

env:
  TZ: Europe/Rome

# contents: checkout, packages: pull GHCR image, actions: prune run history
permissions:
  contents: read
  packages: read
  actions: write

jobs:
  resolve-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
      version_line: ${{ steps.pick.outputs.version_line }}
      release_date: ${{ steps.pick.outputs.release_date }}
    steps:
      - name: Detect available runner
        id: pick
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ARCH: ${{ inputs.architecture }}
        run: |
          FREE=$(gh api "/repos/${{ github.repository }}/actions/runners?per_page=100" 2>/dev/null \
            | jq --arg arch "$ARCH" '[.runners[] | select(.status == "online") | select(.busy == false) | select([.labels[].name] | contains(["self-hosted", $arch]))] | length' \
            || echo "0")
          if [ "$FREE" -gt 0 ]; then
            echo "Found $FREE free self-hosted $ARCH runner(s); using self-hosted."
            echo "runner=[\"self-hosted\",\"$ARCH\"]" >> "$GITHUB_OUTPUT"
          elif [ "$ARCH" = "ARM64" ]; then
            echo "No free self-hosted ARM64 runner; falling back to ubuntu-24.04-arm."
            echo 'runner="ubuntu-24.04-arm"' >> "$GITHUB_OUTPUT"
          else
            echo "No free self-hosted X64 runner; falling back to ubuntu-latest."
            echo 'runner="ubuntu-latest"' >> "$GITHUB_OUTPUT"
          fi
          VERSION_LINE="v$(echo '${{ inputs.immortalwrt_version }}' | grep -oP '^\d+\.\d+')"
          echo "version_line=$VERSION_LINE" >> "$GITHUB_OUTPUT"
          echo "release_date=$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ needs.resolve-runner.outputs.version_line }}/${{ inputs.release_type }}
    needs: resolve-runner
    runs-on: ${{ fromJSON(needs.resolve-runner.outputs.runner) }}
    container:
      image: ${{ inputs.image_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # Container runs as root so host-UID-owned bind mounts stay writable;
      # compile.sh drops to `ubuntu` via gosu before invoking make.
    env:
      BANANAWRT_VERSION_LINE: ${{ needs.resolve-runner.outputs.version_line }}
      BANANAWRT_TRACK: ${{ inputs.release_type }}
      BANANAWRT_IMMORTALWRT_VER: ${{ inputs.immortalwrt_version }}
      BANANAWRT_ARCH: ${{ inputs.architecture }}
      BANANAWRT_RELEASE_DATE: ${{ needs.resolve-runner.outputs.release_date }}
      BANANAWRT_JOBS: ${{ inputs.nproc }}
      BANANAWRT_CI: '1'
    steps:
      - name: Clean previous workspace
        run: |
          sudo rm -rf workspace ftp-upload 2>/dev/null || rm -rf workspace ftp-upload 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate git (private upstream access)
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          git config --global user.name  'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git config --global --add safe.directory '*'
          printf 'machine github.com login %s\n' "${GITHUB_TOKEN:-anonymous}" > "$HOME/.netrc"
          chmod 600 "$HOME/.netrc"

      - name: Compute cache keys
        id: cache
        env:
          RUNNER_ARCH_TAG: ${{ runner.arch }}
        run: |
          CONFIG_HASH=$(sha256sum "config/${BANANAWRT_VERSION_LINE}/${BANANAWRT_TRACK}/.config" | cut -c1-16)
          VERSION_HASH=$(sha256sum "config/${BANANAWRT_VERSION_LINE}/version.json" | cut -c1-16)
          PATCH_HASH=$(find "patch" -type f 2>/dev/null | sort | xargs -r sha256sum | sha256sum | cut -c1-16)
          PATCH_HASH="${PATCH_HASH:-none}"
          BASE="${BANANAWRT_VERSION_LINE}-${BANANAWRT_TRACK}-${BANANAWRT_IMMORTALWRT_VER}"
          # dl/, feeds/ are arch-agnostic; ccache, staging_dir hold host-native binaries.
          echo "dl=dl-${BASE}-${VERSION_HASH}"                                  >> "$GITHUB_OUTPUT"
          echo "feeds=feeds-${BASE}-${VERSION_HASH}"                            >> "$GITHUB_OUTPUT"
          echo "ccache=ccache-${RUNNER_ARCH_TAG}-${BASE}-${CONFIG_HASH}"        >> "$GITHUB_OUTPUT"
          echo "staging=staging-${RUNNER_ARCH_TAG}-${BASE}-${CONFIG_HASH}-${PATCH_HASH}" >> "$GITHUB_OUTPUT"
          echo "arch_tag=${RUNNER_ARCH_TAG}"                                    >> "$GITHUB_OUTPUT"

      - name: Restore dl/ cache
        uses: actions/cache@v4
        with:
          path: workspace/immortalwrt/dl
          key: ${{ steps.cache.outputs.dl }}
          restore-keys: |
            dl-${{ env.BANANAWRT_VERSION_LINE }}-${{ env.BANANAWRT_TRACK }}-
            dl-${{ env.BANANAWRT_VERSION_LINE }}-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: workspace/immortalwrt/.ccache
          key: ${{ steps.cache.outputs.ccache }}
          # Third entry rescues pre-arch-split legacy caches on X64 only.
          restore-keys: |
            ccache-${{ steps.cache.outputs.arch_tag }}-${{ env.BANANAWRT_VERSION_LINE }}-${{ env.BANANAWRT_TRACK }}-
            ccache-${{ steps.cache.outputs.arch_tag }}-${{ env.BANANAWRT_VERSION_LINE }}-
            ${{ runner.arch == 'X64' && format('ccache-{0}-{1}-', env.BANANAWRT_VERSION_LINE, env.BANANAWRT_TRACK) || 'bananawrt-never-match-' }}

      - name: Restore feeds/ cache
        uses: actions/cache@v4
        with:
          path: workspace/immortalwrt/feeds
          key: ${{ steps.cache.outputs.feeds }}
          restore-keys: |
            feeds-${{ env.BANANAWRT_VERSION_LINE }}-

      - name: Restore staging_dir cache
        uses: actions/cache@v4
        with:
          path: workspace/immortalwrt/staging_dir
          key: ${{ steps.cache.outputs.staging }}
          restore-keys: |
            staging-${{ steps.cache.outputs.arch_tag }}-${{ env.BANANAWRT_VERSION_LINE }}-${{ env.BANANAWRT_TRACK }}-
            ${{ runner.arch == 'X64' && format('staging-{0}-{1}-', env.BANANAWRT_VERSION_LINE, env.BANANAWRT_TRACK) || 'bananawrt-never-match-' }}

      - name: Run BananaWRT compile.sh
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          ./compile.sh --ci --no-docker \
            --version-line "${BANANAWRT_VERSION_LINE}" \
            --track "${BANANAWRT_TRACK}" \
            --arch "${BANANAWRT_ARCH}" \
            --immortalwrt-version "${BANANAWRT_IMMORTALWRT_VER}" \
            ${BANANAWRT_JOBS:+--jobs "${BANANAWRT_JOBS}"}

      - name: Surface build summary
        if: always()
        run: |
          FIRMWARE_DIR=$(ls -d workspace/immortalwrt/bin/targets/*/* 2>/dev/null | head -n1 || true)
          {
            echo '## BananaWRT build'
            echo
            echo '| Field | Value |'
            echo '|---|---|'
            echo "| Version line | \`${BANANAWRT_VERSION_LINE}\` |"
            echo "| Track | \`${BANANAWRT_TRACK}\` |"
            echo "| ImmortalWRT | \`${BANANAWRT_IMMORTALWRT_VER}\` |"
            echo "| Architecture | \`${BANANAWRT_ARCH}\` |"
            echo "| Image | \`${{ inputs.image_ref }}\` |"
            echo "| Release tag | \`${BANANAWRT_VERSION_LINE}-${BANANAWRT_RELEASE_DATE}\` |"
            if [ -n "$FIRMWARE_DIR" ]; then
              echo
              echo '### Artefacts'
              echo '```'
              ls -lh "$FIRMWARE_DIR" || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload firmware artefact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: BananaWRT_firmware_${{ needs.resolve-runner.outputs.release_date }}
          path: workspace/immortalwrt/bin/targets/*/*/*
          if-no-files-found: warn
          retention-days: 7

      - name: Upload additional_pack artefacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: BananaWRT_packages_${{ needs.resolve-runner.outputs.release_date }}
          # v24.10 uses opkg (.ipk), v25.12+ uses apk (.apk) — glob both.
          path: |
            workspace/immortalwrt/bin/packages/*/additional_pack/*.ipk
            workspace/immortalwrt/bin/packages/*/additional_pack/*.apk
          if-no-files-found: ignore
          retention-days: 7

      - name: Prune workflow history
        if: success()
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          retain_days: 0
          keep_minimum_runs: 7

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf "$HOME/.netrc" 2>/dev/null || true
          # Drop build_dir/tmp between jobs; caches already captured what's needed.
          rm -rf workspace/immortalwrt/build_dir workspace/immortalwrt/tmp 2>/dev/null || true
