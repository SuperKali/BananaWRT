#
# File: .github/workflows/immortalwrt-sdk-matrix-builder.yml
# Description: Build the BananaWRT SDK tarballs for multiple architectures.
#              The build is driven by compile.sh --no-package so we share every
#              pipeline stage (clone / patch / feeds / config / download /
#              compile) with the firmware builder; only the SDK-specific
#              extraction and upload live in this workflow.
#
# Copyright (c) 2024-2026 SuperKali <hello@superkali.me>
#
# This is free software, licensed under the MIT License.
#

name: BananaWRT SDK Matrix Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Select the release type'
        required: true
        type: choice
        options:
          - stable
          - nightly
        default: stable
      architecture:
        description: 'Select architecture to build for'
        required: true
        type: choice
        options:
          - ALL
          - X64
          - ARM64
        default: 'ALL'
      nproc:
        description: 'Specify the number of threads to use on the compiler'
        required: false
        default: ''
      image_ref:
        description: 'BananaWRT builder image reference'
        required: false
        type: string
        default: 'ghcr.io/superkali/bananawrt-builder:latest'

env:
  TZ: Europe/Rome

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version and set up build matrix
        id: set-matrix
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          TRACK="${{ github.event.inputs.release_type }}"

          # Find the version line that has the selected track
          VERSION=""
          for vf in config/*/version.json; do
            if jq -e --arg t "$TRACK" '.tracks | index($t)' "$vf" > /dev/null 2>&1; then
              VERSION=$(jq -r '.branch' "$vf")
              echo "Resolved $TRACK version: $VERSION from $vf"
              break
            fi
          done
          if [ -z "$VERSION" ]; then
            echo "::error::No version found with track '$TRACK'"
            exit 1
          fi
          VERSIONS=$(echo "$VERSION" | jq -R . | jq -s .)

          if [ "${{ github.event.inputs.architecture }}" = "ALL" ]; then
            ARCHS='["X64", "ARM64"]'
          else
            ARCHS='["${{ github.event.inputs.architecture }}"]'
          fi

          # Count free self-hosted runners per arch (online + idle)
          RUNNERS_JSON=$(gh api "/repos/${{ github.repository }}/actions/runners?per_page=100" 2>/dev/null || echo '{"runners":[]}')
          ARM64_FREE=$(echo "$RUNNERS_JSON" | jq '[.runners[] | select(.status == "online") | select(.busy == false) | select([.labels[].name] | contains(["self-hosted", "ARM64"]))] | length')
          X64_FREE=$(echo "$RUNNERS_JSON"   | jq '[.runners[] | select(.status == "online") | select(.busy == false) | select([.labels[].name] | contains(["self-hosted", "X64"]))]   | length')
          echo "Free self-hosted runners — ARM64: $ARM64_FREE, X64: $X64_FREE"

          # First N items per arch claim self-hosted slots, rest spill to GitHub-hosted
          ARM64_USED=0
          X64_USED=0
          INCLUDES='[]'
          for V in $(echo "$VERSIONS" | jq -r '.[]'); do
            for A in $(echo "$ARCHS" | jq -r '.[]'); do
              if [ "$A" = "ARM64" ]; then
                if [ "$ARM64_USED" -lt "$ARM64_FREE" ]; then
                  RUNNER='["self-hosted","ARM64"]'
                  ARM64_USED=$((ARM64_USED + 1))
                else
                  RUNNER='"ubuntu-24.04-arm"'
                fi
              else
                if [ "$X64_USED" -lt "$X64_FREE" ]; then
                  RUNNER='["self-hosted","X64"]'
                  X64_USED=$((X64_USED + 1))
                else
                  RUNNER='"ubuntu-latest"'
                fi
              fi
              INCLUDES=$(echo "$INCLUDES" | jq --arg v "$V" --arg a "$A" --argjson r "$RUNNER" '. + [{version: $v, arch: $a, runner: $r}]')
            done
          done

          MATRIX=$(jq -nc --argjson inc "$INCLUDES" '{include: $inc}')
          echo "Generated matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-sdk:
    name: SDK ${{ matrix.arch }} / ${{ matrix.version }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    container:
      image: ${{ inputs.image_ref || 'ghcr.io/superkali/bananawrt-builder:latest' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user builder
    env:
      BANANAWRT_ARCH: ${{ matrix.arch }}
      BANANAWRT_IMMORTALWRT_VER: ${{ matrix.version }}
      BANANAWRT_JOBS: ${{ inputs.nproc }}
      BANANAWRT_CCACHE: '1'
      BANANAWRT_CCACHE_MAX: '12G'
    steps:
      - name: Clean previous workspace
        run: |
          rm -rf workspace sdk-artifacts 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve version line + track
        id: resolve
        run: |
          VL="v$(echo '${{ matrix.version }}' | grep -oP '^\d+\.\d+')"
          if [ -f "config/${VL}/stable/.config" ]; then
            TRACK="stable"
          elif [ -f "config/${VL}/nightly/.config" ]; then
            TRACK="nightly"
          else
            echo "::error::No config found for ${VL}"
            exit 1
          fi
          echo "version_line=$VL"   >> "$GITHUB_OUTPUT"
          echo "track=$TRACK"       >> "$GITHUB_OUTPUT"

      - name: Authenticate git (upstream ImmortalWRT access)
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          git config --global user.name  'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git config --global --add safe.directory '*'
          printf 'machine github.com login %s\n' "${GITHUB_TOKEN:-anonymous}" > "$HOME/.netrc"
          chmod 600 "$HOME/.netrc"

      - name: Compute cache keys
        id: cache
        env:
          VL: ${{ steps.resolve.outputs.version_line }}
          TRACK: ${{ steps.resolve.outputs.track }}
        run: |
          CONFIG_HASH=$(sha256sum "config/${VL}/${TRACK}/.config" | cut -c1-16)
          VERSION_HASH=$(sha256sum "config/${VL}/version.json" | cut -c1-16)
          PATCH_HASH=$(find "patch" -type f 2>/dev/null | sort | xargs -r sha256sum | sha256sum | cut -c1-16)
          PATCH_HASH="${PATCH_HASH:-none}"
          BASE="${VL}-${TRACK}-${{ matrix.version }}"
          echo "dl=dl-${BASE}-${VERSION_HASH}"         >> "$GITHUB_OUTPUT"
          echo "ccache=ccache-${BASE}-${CONFIG_HASH}"  >> "$GITHUB_OUTPUT"
          echo "feeds=feeds-${BASE}-${VERSION_HASH}"   >> "$GITHUB_OUTPUT"
          echo "staging=staging-${BASE}-${CONFIG_HASH}-${PATCH_HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore dl/ cache
        uses: actions/cache@v4
        with:
          path: workspace/immortalwrt/dl
          key: ${{ steps.cache.outputs.dl }}
          restore-keys: |
            dl-${{ steps.resolve.outputs.version_line }}-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: workspace/immortalwrt/.ccache
          key: ${{ steps.cache.outputs.ccache }}
          restore-keys: |
            ccache-${{ steps.resolve.outputs.version_line }}-

      - name: Restore feeds/ cache
        uses: actions/cache@v4
        with:
          path: workspace/immortalwrt/feeds
          key: ${{ steps.cache.outputs.feeds }}
          restore-keys: |
            feeds-${{ steps.resolve.outputs.version_line }}-

      - name: Restore staging_dir cache
        uses: actions/cache@v4
        with:
          path: workspace/immortalwrt/staging_dir
          key: ${{ steps.cache.outputs.staging }}
          restore-keys: |
            staging-${{ steps.resolve.outputs.version_line }}-

      - name: Run compile.sh (no package stage)
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          ./compile.sh --no-docker --no-package \
            --version-line "${{ steps.resolve.outputs.version_line }}" \
            --track "${{ steps.resolve.outputs.track }}" \
            --arch "${BANANAWRT_ARCH}" \
            --immortalwrt-version "${BANANAWRT_IMMORTALWRT_VER}" \
            ${BANANAWRT_JOBS:+--jobs "${BANANAWRT_JOBS}"}

      - name: Extract SDK artefact + metadata
        env:
          VL: ${{ steps.resolve.outputs.version_line }}
        run: |
          TREE="workspace/immortalwrt"
          SDK_PATH=$(find "$TREE/bin/targets" -name "*sdk*" -type f | grep -v sha256sum | head -n 1)
          CONFIG_PATH=$(find "$TREE/bin/targets" -name "config.buildinfo" | head -n 1)

          if [ -z "$SDK_PATH" ]; then
            echo "::error::SDK tarball not found under $TREE/bin/targets"
            exit 1
          fi

          SDK_FILENAME=$(basename "$SDK_PATH")
          SDK_SHA256=$(sha256sum "$SDK_PATH" | cut -d' ' -f1)
          SDK_SIZE=$(stat -c%s "$SDK_PATH")
          TARGET=$(echo "$SDK_FILENAME" | sed -n 's/immortalwrt-sdk-.*-\(.*\)_gcc.*/\1/p')

          OUT="sdk-artifacts/bananawrt/sdk/${BANANAWRT_ARCH}/${BANANAWRT_IMMORTALWRT_VER}"
          mkdir -p "$OUT"
          cp "$SDK_PATH" "$OUT/"
          [ -n "$CONFIG_PATH" ] && cp "$CONFIG_PATH" "$OUT/" || true

          cat > "$OUT/sdk-info.json" <<EOF
          {
            "version": "${BANANAWRT_IMMORTALWRT_VER}",
            "architecture": "${BANANAWRT_ARCH}",
            "target": "$TARGET",
            "filename": "$SDK_FILENAME",
            "buildDate": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "sha256": "$SDK_SHA256",
            "size": $SDK_SIZE,
            "download_url": "https://repo.superkali.me/bananawrt/sdk/${BANANAWRT_ARCH}/${BANANAWRT_IMMORTALWRT_VER}/$SDK_FILENAME"
          }
          EOF

      - name: Upload SDK artefact
        uses: actions/upload-artifact@v7
        with:
          name: sdk-${{ matrix.arch }}-${{ matrix.version }}
          path: sdk-artifacts
          retention-days: 1

      - name: Cleanup build tree (keep caches)
        if: always()
        run: |
          rm -rf workspace/immortalwrt/build_dir workspace/immortalwrt/tmp 2>/dev/null || true
          rm -f  "$HOME/.netrc" 2>/dev/null || true

  upload-to-ftp:
    name: Publish SDKs to repo.superkali.me
    needs: [prepare, build-sdk]
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp jq rsync

      - name: Download all SDK artefacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts

      - name: Assemble upload tree + master index
        run: |
          mkdir -p ftp-upload/bananawrt/sdk

          # Seed with the existing master index, if any
          curl -fsS -o ftp-upload/bananawrt/sdk/sdk-master-index.json \
              'https://repo.superkali.me/bananawrt/sdk/sdk-master-index.json' \
              || echo '{"versions":{}}' > ftp-upload/bananawrt/sdk/sdk-master-index.json

          # Copy artefacts into the staging tree (supports both flat and per-artefact layouts)
          for d in all-artifacts/sdk-*/; do
            [ -d "$d/bananawrt/sdk" ] || continue
            rsync -av "$d/bananawrt/sdk/" ftp-upload/bananawrt/sdk/
          done
          [ -d all-artifacts/bananawrt/sdk ] && rsync -av all-artifacts/bananawrt/sdk/ ftp-upload/bananawrt/sdk/

          MATRIX='${{ needs.prepare.outputs.matrix }}'
          VERSIONS=$(echo "$MATRIX" | jq -r '.include[].version' | sort -u)
          ARCHS=$(echo "$MATRIX"   | jq -r '.include[].arch'    | sort -u)
          INDEX='ftp-upload/bananawrt/sdk/sdk-master-index.json'
          BASE='https://repo.superkali.me/bananawrt/sdk'

          for VERSION in $VERSIONS; do
            jq --arg v "$VERSION" '.versions[$v] //= {architectures:{}}' "$INDEX" > "$INDEX.tmp" && mv "$INDEX.tmp" "$INDEX"
            for ARCH in $ARCHS; do
              jq --arg v "$VERSION" --arg a "$ARCH" --arg base "$BASE" \
                 '.versions[$v].architectures[$a] = {
                    sdk_url: ($base + "/" + $a + "/" + $v + "/"),
                    config_url: ($base + "/" + $a + "/" + $v + "/config.buildinfo"),
                    info_url: ($base + "/" + $a + "/" + $v + "/sdk-info.json")
                  }' "$INDEX" > "$INDEX.tmp" && mv "$INDEX.tmp" "$INDEX"
            done
          done

          echo "Upload tree:"
          find ftp-upload -type f -exec ls -lh {} \;

      - name: Upload to FTP
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            set cmd:fail-exit true;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
            mirror --reverse --verbose --only-newer --parallel=2 \
                ftp-upload/bananawrt/sdk /bananawrt/sdk;
            quit
          "

      - name: Summary
        run: |
          {
            echo '## BananaWRT SDK publish'
            echo
            echo '| Field | Value |'
            echo '|---|---|'
            echo '| Repository | https://repo.superkali.me/bananawrt/sdk/ |'
            echo '| Matrix | `${{ needs.prepare.outputs.matrix }}` |'
          } >> "$GITHUB_STEP_SUMMARY"
