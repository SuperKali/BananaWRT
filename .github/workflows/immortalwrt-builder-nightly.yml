name: BananaWRT Builder (Nightly)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Runner architecture (ARM64 self-hosted or X64 GitHub-hosted)'
        required: false
        type: choice
        options:
          - ARM64
          - X64
        default: ARM64
  # Nightly cron disabled: v25.12 promoted to stable and no newer upstream
  # version line (e.g. v26.x) exists yet. Re-add the schedule block when a new
  # nightly version line is set up via immortalwrt-promote.yml.

# Reusable workflows inherit the caller's permissions as an upper bound.
# Declare every permission the reusable (immortalwrt-builder.yml) needs so
# they actually take effect — including actions:write for
# Mattraks/delete-workflow-runs.
permissions:
  contents: write
  packages: read
  actions: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
    - uses: actions/checkout@v7
    - id: read
      run: |
        # Find the version line that has nightly track
        for vf in config/*/version.json; do
          if jq -e '.tracks | index("nightly")' "$vf" > /dev/null 2>&1; then
            VERSION=$(jq -r '.branch' "$vf")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Resolved nightly version: $VERSION from $vf"
            exit 0
          fi
        done
        echo "::error::No version with nightly track found"
        exit 1

  build:
    needs: resolve
    uses: ./.github/workflows/immortalwrt-builder.yml
    with:
      immortalwrt_version: ${{ needs.resolve.outputs.version }}
      release_type: nightly
      architecture: ${{ github.event.inputs.architecture || 'ARM64' }}
    secrets: inherit
