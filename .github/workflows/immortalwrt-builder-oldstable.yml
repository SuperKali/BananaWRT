name: BananaWRT Builder (Oldstable)

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: 0 0 15 * *

permissions:
  contents: write
  packages: read
  actions: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
    - uses: actions/checkout@v6
    - id: read
      run: |
        # Find the version line that has oldstable track
        for vf in config/*/version.json; do
          if jq -e '.tracks | index("oldstable")' "$vf" > /dev/null 2>&1; then
            VERSION=$(jq -r '.branch' "$vf")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Resolved oldstable version: $VERSION from $vf"
            exit 0
          fi
        done
        echo "::error::No version with oldstable track found"
        exit 1

  build:
    needs: resolve
    uses: ./.github/workflows/immortalwrt-builder.yml
    with:
      immortalwrt_version: ${{ needs.resolve.outputs.version }}
      release_type: oldstable
    secrets: inherit
